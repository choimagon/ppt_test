<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PDF 발표 뷰어</title>
  <style>
    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background: #111;
      overflow: hidden;
      font-family: Arial, sans-serif;
      color: white;
    }

    .viewer-wrap {
      position: relative;
      width: 100vw;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #111;
    }

    .pdf-stage {
      position: relative;
      width: calc(100vw - 140px);
      height: calc(100vh - 40px);
      display: flex;
      align-items: center;
      justify-content: center;
      background: #1b1b1b;
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 8px 30px rgba(0, 0, 0, 0.35);
    }

    canvas {
      display: block;
      background: white;
      border-radius: 10px;
      max-width: 100%;
      max-height: 100%;
    }

    .side-btn {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      width: 56px;
      height: 120px;
      border: none;
      border-radius: 16px;
      background: rgba(255, 255, 255, 0.1);
      color: white;
      font-size: 32px;
      cursor: pointer;
      transition: 0.2s ease;
      z-index: 20;
      user-select: none;
      backdrop-filter: blur(4px);
    }

    .side-btn:hover {
      background: rgba(255, 255, 255, 0.2);
    }

    .side-btn:disabled {
      opacity: 0.25;
      cursor: not-allowed;
    }

    .prev-btn {
      left: 18px;
    }

    .next-btn {
      right: 18px;
    }

    .top-info {
      position: absolute;
      top: 14px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 30;
      padding: 8px 16px;
      border-radius: 999px;
      background: rgba(0, 0, 0, 0.45);
      font-size: 15px;
      letter-spacing: 0.3px;
      backdrop-filter: blur(4px);
    }

    .bottom-help {
      position: absolute;
      bottom: 14px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 30;
      padding: 8px 14px;
      border-radius: 999px;
      background: rgba(0, 0, 0, 0.35);
      font-size: 13px;
      color: #ddd;
      backdrop-filter: blur(4px);
    }

    .loading {
      position: absolute;
      z-index: 25;
      font-size: 18px;
      color: #ddd;
    }

    .error {
      position: absolute;
      z-index: 25;
      font-size: 16px;
      color: #ff8a8a;
      background: rgba(0, 0, 0, 0.45);
      padding: 12px 16px;
      border-radius: 12px;
      max-width: 80%;
      text-align: center;
      line-height: 1.5;
      white-space: pre-line;
    }
  </style>
</head>
<body>
  <div class="viewer-wrap">
    <button id="prevBtn" class="side-btn prev-btn" aria-label="이전 페이지">‹</button>

    <div class="pdf-stage">
      <div id="loading" class="loading">PDF 불러오는 중...</div>
      <div id="errorBox" class="error" style="display:none;"></div>
      <div id="pageInfo" class="top-info">페이지 - / -</div>
      <canvas id="pdfCanvas"></canvas>
      <div class="bottom-help">← → 방향키 또는 옆 버튼으로 페이지 이동</div>
    </div>

    <button id="nextBtn" class="side-btn next-btn" aria-label="다음 페이지">›</button>
  </div>

  <script type="module">
    import * as pdfjsLib from "https://cdn.jsdelivr.net/npm/pdfjs-dist@5.4.296/build/pdf.min.mjs";

    pdfjsLib.GlobalWorkerOptions.workerSrc =
      "https://cdn.jsdelivr.net/npm/pdfjs-dist@5.4.296/build/pdf.worker.min.mjs";

    // GitHub raw PDF 주소
    const url = "https://raw.githubusercontent.com/choimagon/ppt_test/main/my.pdf";

    const canvas = document.getElementById("pdfCanvas");
    const ctx = canvas.getContext("2d");
    const prevBtn = document.getElementById("prevBtn");
    const nextBtn = document.getElementById("nextBtn");
    const pageInfo = document.getElementById("pageInfo");
    const loading = document.getElementById("loading");
    const errorBox = document.getElementById("errorBox");

    let pdfDoc = null;
    let pageNum = 1;
    let isRendering = false;
    let pendingPage = null;

    function showError(message) {
      errorBox.style.display = "block";
      errorBox.textContent = message;
      loading.style.display = "none";
    }

    function updateButtons() {
      prevBtn.disabled = !pdfDoc || pageNum <= 1;
      nextBtn.disabled = !pdfDoc || pageNum >= pdfDoc.numPages;
      pageInfo.textContent = `페이지 ${pageNum} / ${pdfDoc ? pdfDoc.numPages : "-"}`;
    }

    async function calculateScale(page) {
      const viewport = page.getViewport({ scale: 1 });

      const availableWidth = window.innerWidth - 180;
      const availableHeight = window.innerHeight - 60;

      const widthScale = availableWidth / viewport.width;
      const heightScale = availableHeight / viewport.height;

      return Math.min(widthScale, heightScale);
    }

    async function renderPage(num) {
      if (!pdfDoc) return;

      isRendering = true;
      loading.style.display = "block";
      errorBox.style.display = "none";

      try {
        const page = await pdfDoc.getPage(num);
        const scale = await calculateScale(page);
        const viewport = page.getViewport({ scale });

        canvas.width = Math.floor(viewport.width);
        canvas.height = Math.floor(viewport.height);

        const renderContext = {
          canvasContext: ctx,
          viewport: viewport
        };

        await page.render(renderContext).promise;

        pageNum = num;
        updateButtons();
        loading.style.display = "none";
      } catch (err) {
        showError("페이지 렌더링 중 오류가 발생했습니다.\n" + err.message);
      } finally {
        isRendering = false;

        if (pendingPage !== null) {
          const nextPage = pendingPage;
          pendingPage = null;
          renderPage(nextPage);
        }
      }
    }

    function queueRenderPage(num) {
      if (!pdfDoc) return;
      if (num < 1 || num > pdfDoc.numPages) return;

      if (isRendering) {
        pendingPage = num;
      } else {
        renderPage(num);
      }
    }

    function goPrevPage() {
      if (!pdfDoc || pageNum <= 1) return;
      queueRenderPage(pageNum - 1);
    }

    function goNextPage() {
      if (!pdfDoc || pageNum >= pdfDoc.numPages) return;
      queueRenderPage(pageNum + 1);
    }

    prevBtn.addEventListener("click", goPrevPage);
    nextBtn.addEventListener("click", goNextPage);

    window.addEventListener("keydown", (e) => {
      if (e.key === "ArrowLeft") {
        goPrevPage();
      } else if (e.key === "ArrowRight" || e.key === " ") {
        e.preventDefault();
        goNextPage();
      }
    });

    window.addEventListener("resize", () => {
      if (pdfDoc) {
        queueRenderPage(pageNum);
      }
    });

    async function initPDF() {
      try {
        const loadingTask = pdfjsLib.getDocument(url);
        pdfDoc = await loadingTask.promise;
        updateButtons();
        renderPage(pageNum);
      } catch (err) {
        showError(
          "PDF를 불러오지 못했습니다.\n\n" +
          "확인할 것:\n" +
          "1. GitHub 저장소가 public 인지\n" +
          "2. 파일명이 정확히 my.pdf 인지\n" +
          "3. raw 주소가 맞는지\n\n" +
          "오류: " + err.message
        );
      }
    }

    initPDF();
  </script>
</body>
</html>
